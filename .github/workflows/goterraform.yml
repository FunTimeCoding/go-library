---
name: goterraform
on: {push: {tags: ['v*']}}
env: {REGISTRY: ghcr.io}
jobs:
  container:
    runs-on: ubuntu-latest
    permissions: {contents: read, packages: write}
    steps:
    - {name: Repository, uses: actions/checkout@v4, with: {fetch-depth: 0}}
    - {name: Go, uses: actions/setup-go@v5, with: {go-version-file: go.mod}}
    - name: Build
      run: go run cmd/gobuild/main.go --linux-amd64 goterraformd
    - name: Lowercase image
      run: echo "IMAGE_LC=${GITHUB_REPOSITORY_OWNER@L}/goterraform" >> $GITHUB_ENV
    - name: Login
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Container
      uses: docker/build-push-action@v7
      with:
        context: .
        file: container/goterraform/Containerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:${{ github.ref_name }}
