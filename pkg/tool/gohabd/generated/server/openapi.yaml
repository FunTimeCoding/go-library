---
openapi: "3.0.0"
info:
  title: gohabd
  version: 1.0.0
paths:
  /api/tasks:
    get:
      operationId: getTasks
      parameters:
      - name: type
        in: query
        schema:
          type: string
          enum: [habits, dailys, todos, rewards]
        description: Task type filter.
      responses:
        "200":
          description: Tasks matching the filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Missing required fields.
  /api/tasks/{identifier}/score/{direction}:
    post:
      operationId: scoreTask
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
        description: Task ID.
      - name: direction
        in: path
        required: true
        schema:
          type: string
          enum: [up, down]
        description: Score direction.
      responses:
        "200":
          description: Score result with updated stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
  /api/tags:
    get:
      operationId: getTags
      responses:
        "200":
          description: All tags.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
  /api/stats:
    get:
      operationId: getStats
      responses:
        "200":
          description: User stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
  /api/cron:
    post:
      operationId: runCron
      responses:
        "200":
          description: Cron result with optional stat diff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronResult"
components:
  schemas:
    Task:
      type: object
      required: [identifier, text, type]
      properties:
        identifier:
          type: string
        text:
          type: string
        type:
          type: string
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        completed:
          type: boolean
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistItem"
        streak:
          type: integer
        value:
          type: number
    ChecklistItem:
      type: object
      required: [identifier, text, completed]
      properties:
        identifier:
          type: string
        text:
          type: string
        completed:
          type: boolean
    CreateTaskRequest:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [habit, daily, todo, reward]
          description: Task type.
        text:
          type: string
          description: Task title.
        notes:
          type: string
          description: Task notes.
    ScoreResult:
      type: object
      required: [hp, mp, xp, gp, level]
      properties:
        hp:
          type: number
        mp:
          type: number
        xp:
          type: number
        gp:
          type: number
        level:
          type: integer
    Tag:
      type: object
      required: [identifier, name]
      properties:
        identifier:
          type: string
        name:
          type: string
    Stats:
      type: object
      required: [hp, mp, xp, gp, level, class]
      properties:
        hp:
          type: number
        mp:
          type: number
        xp:
          type: number
        gp:
          type: number
        level:
          type: integer
        class:
          type: string
    CronResult:
      type: object
      required: [rolled_over, last_cron]
      properties:
        rolled_over:
          type: boolean
        last_cron:
          type: string
        before:
          $ref: "#/components/schemas/Stats"
        after:
          $ref: "#/components/schemas/Stats"
