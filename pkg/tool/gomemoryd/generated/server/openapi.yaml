---
openapi: "3.0.0"
info:
  title: gomemoryd
  version: 1.0.0
paths:
  /api/versions:
    get:
      operationId: getVersions
      parameters:
      - name: since
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        "200":
          description: Memory versions since timestamp.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VersionEntry"
        "500":
          description: Failed to query versions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/profile:
    get:
      operationId: getProfile
      parameters:
      - name: topic
        in: query
        schema:
          type: string
      - name: detail
        in: query
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: Profile with tiered memories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "500":
          description: Failed to load profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/impressions:
    post:
      operationId: postImpressions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                source:
                  type: string
      responses:
        "200":
          description: Impression created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpressionResponse"
        "500":
          description: Failed to create impression.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ImpressionResponse:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: integer
    VersionEntry:
      type: object
      required: [identifier, memory_identifier, name, description, changed_at, change_type, source]
      properties:
        identifier:
          type: integer
        memory_identifier:
          type: integer
        name:
          type: string
        description:
          type: string
        changed_at:
          type: string
        change_type:
          type: string
        source:
          type: string
    ProfileResponse:
      type: object
      required: [always, index]
      properties:
        always:
          type: array
          items:
            $ref: "#/components/schemas/ProfileMemory"
        relevant:
          type: array
          items:
            $ref: "#/components/schemas/ProfileSearchResult"
        index:
          type: array
          items:
            $ref: "#/components/schemas/ProfileSummary"
        impressions:
          type: array
          items:
            $ref: "#/components/schemas/ProfileImpression"
        completions:
          type: array
          items:
            $ref: "#/components/schemas/ProfileCompletion"
        detail:
          $ref: "#/components/schemas/ProfileDetail"
    ProfileDetail:
      type: object
      required: [budget, always_tokens, index_tokens, index_trimmed, completion_tokens, completions_trimmed, impression_tokens, impressions_trimmed, relevant_tokens, relevant_trimmed, total_tokens]
      properties:
        budget:
          type: integer
        always_tokens:
          type: integer
        index_tokens:
          type: integer
        index_trimmed:
          type: integer
        completion_tokens:
          type: integer
        completions_trimmed:
          type: integer
        impression_tokens:
          type: integer
        impressions_trimmed:
          type: integer
        relevant_tokens:
          type: integer
        relevant_trimmed:
          type: integer
        total_tokens:
          type: integer
    ProfileMemory:
      type: object
      required: [identifier, name, content, description, type, created_at, updated_at, is_active]
      properties:
        identifier:
          type: integer
        name:
          type: string
        content:
          type: string
        description:
          type: string
        type:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        is_active:
          type: boolean
        tags:
          type: array
          items:
            type: string
    ProfileSearchResult:
      type: object
      required: [identifier, name, content, description, type, updated_at, rank]
      properties:
        identifier:
          type: integer
        name:
          type: string
        content:
          type: string
        description:
          type: string
        type:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
        rank:
          type: number
    ProfileSummary:
      type: object
      required: [identifier, name, description, type, updated_at]
      properties:
        identifier:
          type: integer
        name:
          type: string
        description:
          type: string
        type:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
        children:
          type: array
          items:
            type: string
    ProfileImpression:
      type: object
      required: [identifier, content, source, created_at]
      properties:
        identifier:
          type: integer
        content:
          type: string
        source:
          type: string
        created_at:
          type: string
    ProfileCompletion:
      type: object
      required: [session_name, body]
      properties:
        session_name:
          type: string
        body:
          type: string
    ErrorResponse:
      type: object
      required: [error, event_identifier]
      properties:
        error:
          type: string
        event_identifier:
          type: string
