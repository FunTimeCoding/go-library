---
openapi: "3.0.0"
info:
  title: gonetb
  version: 1.0.0
paths:
  /api/v1/devices:
    get:
      operationId: listDevices
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
        description: Filter devices by name (case-insensitive contains). Omit for all.
      responses:
        "200":
          description: Devices.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
  /api/v1/devices/{name}:
    get:
      operationId: getDevice
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Device name (exact match).
      responses:
        "200":
          description: Device detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found.
  /api/v1/devices/{name}/interfaces:
    get:
      operationId: listInterfaces
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Device name.
      responses:
        "200":
          description: Interfaces for the device.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Interface"
  /api/v1/devices/{name}/addresses:
    get:
      operationId: listAddresses
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Device name.
      responses:
        "200":
          description: IP addresses assigned to the device.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
  /api/v1/sites:
    get:
      operationId: listSites
      responses:
        "200":
          description: All sites.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"
components:
  schemas:
    Device:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int32
        name:
          type: string
        role:
          type: string
        type:
          type: string
        site:
          type: string
        tenant:
          type: string
        serial:
          type: string
        primaryAddress:
          type: string
        tags:
          type: array
          items:
            type: string
        link:
          type: string
    Interface:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
        type:
          type: string
        physicalAddress:
          type: string
    Address:
      type: object
      required:
      - identifier
      - address
      properties:
        identifier:
          type: integer
          format: int32
        address:
          type: string
        name:
          type: string
        objectType:
          type: string
    Site:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int32
        name:
          type: string
