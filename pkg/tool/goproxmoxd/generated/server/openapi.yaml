        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createMachine
      parameters:
      - $ref: "#/components/parameters/Instance"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMachineRequest"
      responses:
        "200":
          description: Machine created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMachineResult"
        "400":
          description: Invalid or missing parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/machines/{identifier}:
    get:
      operationId: getMachine
      parameters:
      - $ref: "#/components/parameters/Instance"
      - name: identifier
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Machine ID.
      - name: node
        in: query
        required: false
        schema:
          type: string
        description: Node name. Speeds up lookup when known.
