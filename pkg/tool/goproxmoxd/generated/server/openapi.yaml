        in: path
        required: true
        schema:
          type: string
        description: Node name.
      responses:
        "200":
          description: Node status detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeStatus"
        "404":
          description: Node not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid or missing parameters.
          content:
            application/json:
