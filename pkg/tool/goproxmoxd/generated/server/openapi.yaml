---
openapi: "3.0.0"
info:
  title: goproxmoxd
  version: 2.0.0
paths:
  /api/v1/instances:
    get:
      operationId: listInstances
      responses:
        "200":
          description: All configured Proxmox instances.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstanceDetail"
  /api/v1/nodes:
    get:
      operationId: listNodes
      parameters:
      - $ref: "#/components/parameters/Instance"
      responses:
        "200":
          description: All Proxmox nodes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"
        "400":
          description: Invalid or missing parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/nodes/{name}/status:
