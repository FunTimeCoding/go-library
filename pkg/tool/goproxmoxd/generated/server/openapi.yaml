        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Machine ID.
      - name: node
        in: query
        required: false
        schema:
          type: string
        description: Node name. Speeds up lookup when known.
      - name: purge
        in: query
        required: false
        schema:
          type: boolean
        description: Remove from cluster config and associated resources.
      responses:
        "200":
          description: Machine deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"
        "404":
          description: Machine not found.
          content:
            application/json:
