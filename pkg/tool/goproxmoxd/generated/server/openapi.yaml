components:
  parameters:
    Instance:
      name: instance
      in: query
      required: false
      schema:
        type: string
      description: Proxmox instance name. Optional when only one instance is configured.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    InstanceDetail:
      type: object
      required: [name, host]
      properties:
        name:
          type: string
        host:
          type: string
    ErrorResponse:
      type: object
      required: [error, event_identifier]
      properties:
        error:
          type: string
        event_identifier:
          type: string
    Node:
      type: object
      required:
      - name
      - status
      properties:
        name:
          type: string
        status:
          type: string
        cpu:
          type: number
          format: double
        maxCpu:
          type: integer
        mem:
          type: integer
          format: int64
        maxMem:
          type: integer
          format: int64
        disk:
          type: integer
          format: int64
        maxDisk:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
    NodeStatus:
      type: object
      properties:
        cpu:
          type: number
          format: double
        uptime:
          type: integer
        kernelVersion:
          type: string
        proxmoxVersion:
          type: string
        loadAverage:
          type: array
          items:
            type: string
        memory:
          $ref: "#/components/schemas/MemoryInfo"
        swap:
          $ref: "#/components/schemas/MemoryInfo"
        rootFilesystem:
          $ref: "#/components/schemas/MemoryInfo"
    MemoryInfo:
      type: object
      properties:
        total:
          type: integer
          format: int64
        used:
          type: integer
          format: int64
        free:
          type: integer
          format: int64
    Machine:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int64
        name:
          type: string
        node:
          type: string
        status:
          type: string
        cpu:
          type: number
          format: double
        cpus:
          type: integer
        mem:
          type: integer
          format: int64
        maxMem:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
        tags:
          type: string
    MachineDetail:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int64
        name:
          type: string
        node:
          type: string
        status:
          type: string
        cpu:
          type: number
          format: double
        cpus:
          type: integer
        mem:
          type: integer
          format: int64
        maxMem:
          type: integer
          format: int64
        disk:
          type: integer
          format: int64
        maxDisk:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
        tags:
          type: string
        description:
          type: string
        osType:
          type: string
        sockets:
          type: integer
        cores:
          type: integer
    Container:
      type: object
      required:
      - identifier
      - name
      properties:
        identifier:
          type: integer
          format: int64
        name:
          type: string
        node:
          type: string
        status:
          type: string
        cpus:
          type: integer
        maxMem:
          type: integer
          format: int64
        maxDisk:
          type: integer
          format: int64
        maxSwap:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
        tags:
          type: string
    ContainerDetail:
      type: object
      required:
      - identifier
      - name
      properties:
