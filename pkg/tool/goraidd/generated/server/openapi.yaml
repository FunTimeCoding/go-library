---
openapi: "3.0.0"
info:
  title: goraidd
  version: 1.0.0
paths:
  /api/v1/logs:
    get:
      operationId: getLogs
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
      - name: start
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: Available combat logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
  /api/v1/reports:
    get:
      operationId: getReports
      responses:
        "200":
          description: Generated report files.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportResponse"
  /api/v1/generate:
    post:
      operationId: postGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "201":
          description: Report generation started.
        "501":
          description: Not yet implemented.
components:
  schemas:
    LogsResponse:
      type: object
      required:
      - total
      - logs
      properties:
        total:
          type: integer
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogResponse"
    LogResponse:
      type: object
      required:
      - fileName
      - time
      - duration
      - mapId
      - playerCount
      - players
      properties:
        fileName:
          type: string
        time:
          type: string
        duration:
          type: string
        mapId:
          type: integer
        playerCount:
          type: integer
        players:
          type: array
          items:
            type: string
    ReportResponse:
      type: object
      required:
      - fileName
      - time
      - size
      properties:
        fileName:
          type: string
        time:
          type: string
        size:
          type: integer
          format: int64
    GenerateRequest:
      type: object
      required:
      - fileNames
      properties:
        fileNames:
          type: array
          items:
            type: string
